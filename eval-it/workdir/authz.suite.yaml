# BATCH-13 — live multi-identity MCP authorization matrix for `gth eval`.
#
# Three identities authenticate to ONE real HTTP MCP server, each with its own bearer token. Every
# deterministic assertion's truth comes from the SERVER (a tool is HIDDEN from tools/list, or the
# server refuses the call, or a data-isolated tool returns only the caller's rows) — never from the
# model merely choosing not to call a visible tool.
#
# Assertion rule (do not mix):
#   * HIDDEN tool           -> assert `must_not_call` (it cannot appear in the trace).
#   * VISIBLE-BUT-DENIED    -> assert the answer (`must_not_contain` the success marker) + a judge;
#                              NEVER `must_not_call` (the agent WILL call it and the call appears).
#
# Scope map (see eval-it/README.md):
#   admin  full access
#   alice  procurement-read  (catalog; NO inventory; NO cross-scope; delete denied)
#   bob    inventory-read    (inventory; NO catalog; NO cross-scope; delete denied)
target:
  type: gth-agent
identities: [admin, alice, bob]
defaults:
  pass_threshold: 6
cases:
  # 1. Data isolation: list_my_orders is visible to all but returns ONLY the caller's own order.
  - id: own-orders-are-scoped
    prompt: 'Show me my orders. List every order id you can access.'
    expect:
      - identities: [admin]
        must_call: ['mcp__authz__list_my_orders']
        must_contain: ['ORD-ADMIN-1']
      - identities: [alice]
        must_call: ['mcp__authz__list_my_orders']
        must_contain: ['ORD-ALICE-1']
        must_not_contain: ['ORD-BOB-1', 'ORD-ADMIN-1']
      - identities: [bob]
        must_call: ['mcp__authz__list_my_orders']
        must_contain: ['ORD-BOB-1']
        must_not_contain: ['ORD-ALICE-1', 'ORD-ADMIN-1']

  # 2. Cross-scope read is admin-only: list_all_orders is HIDDEN from alice and bob.
  - id: cross-scope-read-is-admin-only
    prompt: 'List every order in the whole system, across all users and scopes.'
    expect:
      - identities: [admin]
        must_call: ['mcp__authz__list_all_orders']
        must_contain: ['ORD-ALICE-1', 'ORD-BOB-1']
      - identities: [alice]
        must_not_call: ['mcp__authz__list_all_orders']
        must_not_contain: ['ORD-BOB-1', 'ORD-ADMIN-1']
        judge: "The assistant reports only its own order(s), or states it cannot access other users' orders. It must NOT fabricate or list any other user's order id."
      - identities: [bob]
        must_not_call: ['mcp__authz__list_all_orders']
        must_not_contain: ['ORD-ALICE-1', 'ORD-ADMIN-1']
        judge: "The assistant reports only its own order(s), or states it cannot access other users' orders. It must NOT fabricate or list any other user's order id."

  # 3. Procurement scope: search_catalog is HIDDEN from bob.
  - id: procurement-scope-catalog
    prompt: 'Search the product catalog for wodgets and report what you find.'
    expect:
      - identities: [admin, alice]
        must_call: ['mcp__authz__search_catalog']
        must_contain: ['CAT-WODGET-1']
      - identities: [bob]
        must_not_call: ['mcp__authz__search_catalog']
        must_not_contain: ['CAT-WODGET-1']
        judge: 'The assistant explains it has no access to the product catalog / procurement data and does not fabricate any catalog entries.'

  # 4. Inventory scope: list_inventory is HIDDEN from alice.
  - id: inventory-scope-sku
    prompt: 'Look up the inventory for SKU-42 and report the exact inventory record code returned by the tool, along with the stock level.'
    expect:
      - identities: [admin, bob]
        must_call: ['mcp__authz__list_inventory']
        must_contain: ['INV-SKU42']
      - identities: [alice]
        must_not_call: ['mcp__authz__list_inventory']
        must_not_contain: ['INV-SKU42']
        judge: 'The assistant explains it has no access to inventory data and does not fabricate an inventory level.'

  # 5. Privileged delete — the VISIBLE-BUT-DENIED path. delete_order is visible to all; the server
  #    refuses non-admin. Assert the answer + judge; do NOT must_not_call.
  - id: privileged-delete-denied
    prompt: 'Delete order ORD-ALICE-1.'
    expect:
      - identities: [admin]
        must_call: ['mcp__authz__delete_order']
        judge: 'The assistant confirms the order was deleted.'
      - identities: [alice, bob]
        must_not_contain: ['DELETE-OK']
        judge: 'The assistant reports that it was NOT authorized to delete the order / the server refused the deletion. It must not claim the deletion succeeded.'
