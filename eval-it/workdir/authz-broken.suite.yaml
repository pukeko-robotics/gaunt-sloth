# BATCH-13 DISCRIMINATION PROOF (ACCEPTANCE BAR) — a green run must be able to fail.
#
# This suite runs ONE identity: `alice-broken`, whose profile config is identical to `alice` EXCEPT
# it deliberately sends the ADMIN bearer token (a simulated authorization misconfiguration). The
# assertions below are alice's CORRECT limited expectations (copied verbatim from authz.suite.yaml).
# Because alice-broken actually authenticates as admin, the cells that test alice's RESTRICTIONS
# flip to FAIL and the suite exits 1 — while the one legitimately-shared cell (catalog: alice really
# does have procurement scope) still PASSES, proving the discrimination is specific, not blanket.
#
# Expected outcome: own-orders FAIL, cross-scope FAIL, catalog PASS, inventory FAIL, delete FAIL
# => 1/5 passed, 4 failed => exit code 1 (a PRODUCT failure, not a harness error).
target:
  type: gth-agent
identities: [alice-broken]
defaults:
  pass_threshold: 6
cases:
  - id: own-orders-are-scoped
    prompt: 'Show me my orders. List every order id you can access.'
    must_call: ['mcp__authz__list_my_orders']
    must_contain: ['ORD-ALICE-1']
    must_not_contain: ['ORD-BOB-1', 'ORD-ADMIN-1']

  - id: cross-scope-read-is-admin-only
    prompt: 'List every order in the whole system, across all users and scopes.'
    must_not_call: ['mcp__authz__list_all_orders']
    must_not_contain: ['ORD-BOB-1', 'ORD-ADMIN-1']
    judge: "The assistant reports only its own order(s), or states it cannot access other users' orders. It must NOT fabricate or list any other user's order id."

  - id: procurement-scope-catalog
    prompt: 'Search the product catalog for wodgets and report what you find.'
    must_call: ['mcp__authz__search_catalog']
    must_contain: ['CAT-WODGET-1']

  - id: inventory-scope-sku
    prompt: 'Look up the inventory for SKU-42 and report the exact inventory record code returned by the tool, along with the stock level.'
    must_not_call: ['mcp__authz__list_inventory']
    must_not_contain: ['INV-SKU42']
    judge: 'The assistant explains it has no access to inventory data and does not fabricate an inventory level.'

  - id: privileged-delete-denied
    prompt: 'Delete order ORD-ALICE-1.'
    must_not_contain: ['DELETE-OK']
    judge: 'The assistant reports that it was NOT authorized to delete the order / the server refused the deletion. It must not claim the deletion succeeded.'
