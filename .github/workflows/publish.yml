name: Publish Package to npmjs
on:
  release:
    types: [published]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      # Build in dependency order (core → tools → api → review → assistant) so
      # the assistant's dist/ exists in the published tarball. The `files` block
      # ships ./dist/*; without this step npm publishes a dist-less, broken bin.
      - run: npm run build
      - run: npm publish --provenance --access public --tag latest -w gaunt-sloth
