name: Publish packages

# Manually dispatched end-to-end publish pipeline for the synced library
# packages (@gaunt-sloth/{core,tools,api,review}). The user-facing
# gaunt-sloth CLI is intentionally EXCLUDED — it carries its own
# version and is published by publish.yml (see docs/RELEASE-HOWTO.md).
#
# Flow (each stage gates the next): lint + unit -> integration tests ->
# integration tests on platforms -> tag packages -> publish to npmjs.
#
# Publishing uses npm Trusted Publishing (OIDC), same as publish.yml — no
# NPM_TOKEN, just `id-token: write`. Bump and commit the library versions first
# (`npm run release:bump-and-commit -- <version>`); npm refuses to republish an
# existing version, so dispatching without a fresh version will fail at the
# publish stage.

on:
  workflow_dispatch:

jobs:
  lint-and-unit:
    name: Lint and unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: [24.x]
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: Run Tests
        run: npm test

  integration-tests:
    name: Integration tests
    needs: lint-and-unit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: integration tests
    strategy:
      matrix:
        node-version: [24.x]
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run Integration
        run: npm run it $BIG_TEST_PROVIDER
        env:
          BIG_TEST_PROVIDER: ${{ vars.BIG_TEST_PROVIDER }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  integration-tests-platforms:
    name: Integration tests platforms
    needs: integration-tests
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    environment: integration tests
    strategy:
      fail-fast: false
      matrix:
        # only test macOS and Windows, linux is covered by the integration-tests job
        os: [macos-latest, windows-latest]
        node-version: [24.x, latest]
        provider: [openrouter]
      max-parallel: 2
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run lite integration tests with ${{ matrix.provider }}
        run: npm run it ${{ matrix.provider }} simple
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          INCEPTION_API_KEY: ${{ secrets.INCEPTION_API_KEY }}
          OPEN_ROUTER_API_KEY: ${{ secrets.OPEN_ROUTER_API_KEY }}

  publish-packages:
    name: Tag and publish packages
    needs: integration-tests-platforms
    runs-on: ubuntu-latest
    environment: integration tests
    permissions:
      contents: write # push the @gaunt-sloth/<pkg>@<version> git tags
      id-token: write # npm Trusted Publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@v6
        with:
          # full history + tags so tag-packages.sh can skip already-tagged versions
          fetch-depth: 0
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          # no registry-url: it writes an .npmrc referencing ${NODE_AUTH_TOKEN},
          # which is unset under Trusted Publishing and breaks every npm command;
          # publish-all.sh passes --registry "$REGISTRY" explicitly instead
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Tag packages (excludes assistant)
        run: ./tag-packages.sh --push
      - name: Publish packages to npmjs (excludes assistant)
        run: npm run release:publish
        env:
          REGISTRY: https://registry.npmjs.org
          NPM_PUBLISH_ARGS: --access public --provenance
