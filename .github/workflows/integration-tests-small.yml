name: Integration tests small

on:
  workflow_dispatch:
  # Manually schedulable from a PR by adding the `run-integration-tests-small` label.
  # Re-add the label (remove then add) to re-run.
  pull_request:
    types: [labeled]

jobs:
  integration-tests:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.label.name == 'run-integration-tests-small' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: integration tests
    strategy:
      fail-fast: false
      matrix:
        node-version: [24.x]
        provider: [groq, inception, openrouter, xai]
      max-parallel: 3

    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run lite integration tests with ${{ matrix.provider }}
      run: npm run it ${{ matrix.provider }} simple
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        INCEPTION_API_KEY: ${{ secrets.INCEPTION_API_KEY }}
        OPEN_ROUTER_API_KEY: ${{ secrets.OPEN_ROUTER_API_KEY }}
        XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
