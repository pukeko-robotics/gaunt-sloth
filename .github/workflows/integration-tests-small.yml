name: Integration tests small

on:
  workflow_dispatch:

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: integration tests
    strategy:
      fail-fast: false
      matrix:
        node-version: [24.x]
        provider: [groq, inception, openrouter, xai]
      max-parallel: 3

    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}

    - name: Enable Corepack
      run: corepack enable

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run lite integration tests with ${{ matrix.provider }}
      run: pnpm run it ${{ matrix.provider }} xx-small
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        INCEPTION_API_KEY: ${{ secrets.INCEPTION_API_KEY }}
        OPEN_ROUTER_API_KEY: ${{ secrets.OPEN_ROUTER_API_KEY }}
        XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
