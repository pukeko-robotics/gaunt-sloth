name: TUI PTY e2e (it-tui)

# Runner for the Ink TUI's PTY-level e2e suite (`@microsoft/tui-test`,
# packages/app/tui-e2e/, run via `pnpm run it-tui`). The suite is hermetic and key-free
# (drives a fixture agent, no live model / API key) and runs the full Linux + macOS +
# Windows matrix.
#
# TUI-C28: now a RELEASE GATE. It is exposed as a reusable workflow (`workflow_call`) and
# `release.yml` calls it before the publish job, so a TUI regression on any OS — including
# Windows — blocks a release. `workflow_dispatch` is retained so it can still be run by
# hand against any branch for verification. Locally it is the coordinator/subagent
# pre-merge gate for TUI changes (`pnpm run it-tui`), documented in AGENTS.md.

on:
  workflow_dispatch:
  workflow_call:

jobs:
  it-tui:
    name: it-tui (${{ matrix.os }})
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Enable Corepack
        run: corepack enable

      - name: Use Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TUI PTY e2e
        run: pnpm run it-tui
