name: Windows debug (fast iteration)

# Standalone, manually-dispatched, windows-latest-only runner for fast iteration on
# Windows-specific bugs (GS2-42: win32 SQLite file-handle leak in historyStore).
#
# unit-tests.yml already has a workflow_dispatch-gated `test-platforms` matrix
# (macos-latest/windows-latest x node 24.x/latest), but a full dispatch there costs 4
# runner-jobs and several minutes per iteration. This workflow runs a single, targeted
# test file on a single windows-latest job so each debug iteration is cheap.
#
# Deliberately NOT wired into unit-tests.yml or release.yml — it is a permanent dev
# tool (like tui-e2e.yml), useful for any future Windows-specific debugging, not a
# one-off throwaway for GS2-42.

on:
  workflow_dispatch:

jobs:
  win-debug:
    name: win-debug (windows-latest)
    permissions:
      contents: read
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Enable Corepack
        run: corepack enable

      - name: Use Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run targeted historyStore spec
        run: pnpm vitest run packages/core/spec/historyStore.spec.ts

  rel8-shim-conflict-repro:
    name: rel8-shim-conflict-repro (windows-latest)
    # REL-8: cross-package bin-shim conflict. gaunt-sloth-assistant (1.x) declares four bins
    # and gaunt-sloth (2.x) three; the three shared names (gth/gsloth/gaunt-sloth ->
    # cli.js). A user who has the 1.x package installed and then installs the 2.x package on
    # top, without removing the old one first, has two global npm packages fighting over the
    # same shim files. This job installs real, already-published packages from the registry
    # (no repo checkout needed) and probes for the corrupted-gth.ps1 symptom seen manually on
    # 2026-06-29, in a loop, across several fresh windows-latest VMs (one per dispatch) plus
    # several in-job iterations, to separate a reproducible defect from a one-off glitch.
    #
    # This is the "no removal" reproduction loop ONLY. It is EXPECTED to keep failing
    # forever: gaunt-sloth-assistant@1.x is an already-published, immutable package, so the
    # EEXIST shim collision is inherent to npm's behavior, not something gaunt-sloth's own
    # code can fix. `continue-on-error: true` below means this job never fails the overall
    # workflow run -- it's informational (useful to notice if it ever stops reproducing,
    # e.g. npm changes its shim-collision behavior) but not actionable on its own. The
    # separate, should-always-pass workaround confirmation lives in
    # rel8-shim-conflict-workaround below -- keeping them as two jobs means a future
    # regression in the *workaround* can't hide inside this job's everyday expected-red
    # noise, and vice versa.
    #
    # Permanent regression check for this class of bug (like win-debug above), not a
    # throwaway for the REL-8 investigation.
    permissions:
      contents: read
    runs-on: windows-latest
    continue-on-error: true

    steps:
      - name: Use Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24.x

      - name: Probe cross-package shim conflict (gaunt-sloth-assistant -> gaunt-sloth@alpha)
        shell: pwsh
        run: |
          # Deliberately NOT `$ErrorActionPreference = 'Stop'`: we want every iteration's
          # checks to run to completion and be recorded, not die on the first failure.
          $ErrorActionPreference = 'Continue'
          $failures = @()

          # npm's global bin dir is NOT always %APPDATA%\npm -- on GitHub-hosted
          # windows-latest runners it's C:\npm\prefix (set by the runner image), while a
          # real interactive Windows install defaults to %APPDATA%\npm (see
          # docs/windows-vm-testing.md). Ask npm itself so the shim-path checks below are
          # correct in either environment, and so this dir is on PATH before the first
          # global install creates it.
          $npmPrefix = (npm config get prefix 2>$null | Out-String).Trim()
          Write-Host "npm global prefix: $npmPrefix"
          $env:PATH = "$npmPrefix;$env:PATH"

          function Test-Cmd {
            param([string]$Label, [scriptblock]$Block)
            try {
              & $Block
              if ($LASTEXITCODE -ne 0) {
                Write-Host "FAIL: $Label (exit $LASTEXITCODE)"
                $script:failures += "$Label (exit $LASTEXITCODE)"
              } else {
                Write-Host "OK: $Label"
              }
            } catch {
              Write-Host "FAIL: $Label (exception: $($_.Exception.Message))"
              $script:failures += "$Label (exception: $($_.Exception.Message))"
            }
          }

          # Checks the reported version does NOT start with "1." (i.e. the upgrade away
          # from the old 1.x line actually took effect) -- not just that the command exits
          # 0, and not that it equals a hardcoded new major. A cross-package shim conflict
          # can leave npm's global bin pointing at the OLD package while still exiting 0,
          # so a plain --version-runs check silently passes on a broken upgrade. This is
          # what actually caught the real bug (see run evidence in the REL-8 report).
          # Matched via -match (search anywhere in the trimmed output, not just an anchor
          # at position 0) so a future leading banner/deprecation-notice line before the
          # version string doesn't produce a false FAIL. Not pinned to "2." specifically so
          # this stays correct once gaunt-sloth ships 3.0.0 and beyond -- the only thing
          # that actually matters here is "not still on the old 1.x line".
          function Test-VersionUpgraded {
            param([string]$Label, [scriptblock]$Block)
            try {
              $out = & $Block 2>&1 | Out-String
              $out = $out.Trim()
              if ($LASTEXITCODE -ne 0) {
                Write-Host "FAIL: $Label (exit $LASTEXITCODE, output: $out)"
                $script:failures += "$Label (exit $LASTEXITCODE, output: $out)"
              } elseif ($out -match '(?m)^1\.\d') {
                Write-Host "FAIL: $Label (still on 1.x, got: $out)"
                $script:failures += "$Label (still on 1.x, got: $out)"
              } else {
                Write-Host "OK: $Label ($out)"
              }
            } catch {
              Write-Host "FAIL: $Label (exception: $($_.Exception.Message))"
              $script:failures += "$Label (exception: $($_.Exception.Message))"
            }
          }

          for ($iter = 1; $iter -le 3; $iter++) {
            Write-Host ""
            Write-Host "========== Iteration $iter/3 =========="

            Write-Host "-- clean slate: removing both packages (errors ignored) --"
            npm rm -g gaunt-sloth-assistant 2>&1 | Out-Host
            npm rm -g gaunt-sloth 2>&1 | Out-Host

            Write-Host "-- installing gaunt-sloth-assistant (1.x) --"
            npm i -g gaunt-sloth-assistant 2>&1 | Out-Host

            Test-Cmd "iter$iter 1.x: gth --version" { gth --version }
            Test-Cmd "iter$iter 1.x: gsloth --version" { gsloth --version }
            Test-Cmd "iter$iter 1.x: gaunt-sloth --version" { gaunt-sloth --version }

            Write-Host "-- installing gaunt-sloth@alpha (2.x) ON TOP, NOT removing 1.x first --"
            npm i -g gaunt-sloth@alpha 2>&1 | Out-Host
            if ($LASTEXITCODE -ne 0) {
              Write-Host "FAIL: iter$iter npm i -g gaunt-sloth@alpha (exit $LASTEXITCODE)"
              $failures += "iter$iter npm i -g gaunt-sloth@alpha failed (exit $LASTEXITCODE) -- likely EEXIST on a bin shared with gaunt-sloth-assistant"
            } else {
              Write-Host "OK: iter$iter npm i -g gaunt-sloth@alpha (exit 0)"
            }

            Test-VersionUpgraded "iter$iter 2.x: gth --version" { gth --version }
            Test-VersionUpgraded "iter$iter 2.x: gsloth --version" { gsloth --version }
            Test-VersionUpgraded "iter$iter 2.x: gaunt-sloth --version" { gaunt-sloth --version }

            $shimPath = Join-Path $npmPrefix 'gth.ps1'
            try {
              $firstLine = Get-Content -Path $shimPath -TotalCount 1 -ErrorAction Stop
              Write-Host "iter$iter gth.ps1 ($shimPath) first line: [$firstLine]"
              if ($firstLine -match '^#!' -or $firstLine -match '\$basedir=') {
                Write-Host "OK: iter$iter gth.ps1 looks like a healthy shim"
              } else {
                Write-Host "FAIL: iter$iter gth.ps1 does not look like a healthy shim"
                $failures += "iter$iter gth.ps1 corrupt/unexpected first line: [$firstLine]"
              }
            } catch {
              Write-Host "FAIL: iter$iter gth.ps1 ($shimPath) unreadable: $($_.Exception.Message)"
              $failures += "iter$iter gth.ps1 ($shimPath) unreadable: $($_.Exception.Message)"
            }

            Test-VersionUpgraded "iter$iter cmd.exe: gth --version" { cmd /c "gth --version" }

            Write-Host "========== End iteration $iter/3 =========="
          }

          Write-Host ""
          Write-Host "================ SUMMARY ================"
          if ($failures.Count -eq 0) {
            Write-Host "All checks passed across 3 iterations. Cross-package shim conflict NOT reproduced this run."
            exit 0
          } else {
            Write-Host "$($failures.Count) check(s) FAILED:"
            foreach ($f in $failures) { Write-Host " - $f" }
            Write-Host "Cross-package shim conflict REPRODUCED this run."
            exit 1
          }

  rel8-shim-conflict-workaround:
    name: rel8-shim-conflict-workaround (windows-latest)
    # REL-8: confirms the documented workaround for the cross-package bin-shim conflict
    # (see rel8-shim-conflict-repro above for the full bug description). This job installs
    # gaunt-sloth-assistant (1.x), applies the documented fix (`npm rm -g
    # gaunt-sloth-assistant` BEFORE installing the 2.x package), then installs
    # gaunt-sloth@alpha and checks all four --version invocations report the upgraded
    # version. Unlike rel8-shim-conflict-repro, this should reliably PASS -- if it ever
    # goes red, that's the actionable signal (our documented fix stopped working), kept
    # cleanly separate from the repro job's permanent expected-red.
    permissions:
      contents: read
    runs-on: windows-latest

    steps:
      - name: Use Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24.x

      - name: Confirm documented workaround (remove gaunt-sloth-assistant before installing gaunt-sloth@alpha)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $failures = @()

          # npm's global bin dir is NOT always %APPDATA%\npm -- on GitHub-hosted
          # windows-latest runners it's C:\npm\prefix (set by the runner image), while a
          # real interactive Windows install defaults to %APPDATA%\npm (see
          # docs/windows-vm-testing.md). Ask npm itself so this stays correct in either
          # environment, and so this dir is on PATH before the first global install
          # creates it.
          $npmPrefix = (npm config get prefix 2>$null | Out-String).Trim()
          Write-Host "npm global prefix: $npmPrefix"
          $env:PATH = "$npmPrefix;$env:PATH"

          # Checks the reported version does NOT start with "1." (i.e. the upgrade away
          # from the old 1.x line actually took effect) -- not that it equals a hardcoded
          # new major, so this stays correct once gaunt-sloth ships 3.0.0 and beyond.
          # Matched via -match (search anywhere in the trimmed output) so a future leading
          # banner/deprecation-notice line before the version string doesn't produce a
          # false FAIL.
          function Test-VersionUpgraded {
            param([string]$Label, [scriptblock]$Block)
            try {
              $out = & $Block 2>&1 | Out-String
              $out = $out.Trim()
              if ($LASTEXITCODE -ne 0) {
                Write-Host "FAIL: $Label (exit $LASTEXITCODE, output: $out)"
                $script:failures += "$Label (exit $LASTEXITCODE, output: $out)"
              } elseif ($out -match '(?m)^1\.\d') {
                Write-Host "FAIL: $Label (still on 1.x, got: $out)"
                $script:failures += "$Label (still on 1.x, got: $out)"
              } else {
                Write-Host "OK: $Label ($out)"
              }
            } catch {
              Write-Host "FAIL: $Label (exception: $($_.Exception.Message))"
              $script:failures += "$Label (exception: $($_.Exception.Message))"
            }
          }

          Write-Host "========== Workaround check: remove gaunt-sloth-assistant before installing gaunt-sloth@alpha =========="
          Write-Host "-- clean slate --"
          npm rm -g gaunt-sloth-assistant 2>&1 | Out-Host
          npm rm -g gaunt-sloth 2>&1 | Out-Host

          Write-Host "-- installing gaunt-sloth-assistant (1.x) --"
          npm i -g gaunt-sloth-assistant 2>&1 | Out-Host

          Write-Host "-- applying documented workaround: npm rm -g gaunt-sloth-assistant --"
          npm rm -g gaunt-sloth-assistant 2>&1 | Out-Host

          Write-Host "-- installing gaunt-sloth@alpha (2.x) after the workaround --"
          npm i -g gaunt-sloth@alpha 2>&1 | Out-Host
          $workaroundInstallExit = $LASTEXITCODE
          if ($workaroundInstallExit -ne 0) {
            Write-Host "FAIL: workaround npm i -g gaunt-sloth@alpha (exit $workaroundInstallExit)"
            $failures += "workaround npm i -g gaunt-sloth@alpha failed (exit $workaroundInstallExit) -- workaround did NOT fix the install"
          } else {
            Write-Host "OK: workaround npm i -g gaunt-sloth@alpha (exit 0)"
          }

          Test-VersionUpgraded "workaround: gth --version" { gth --version }
          Test-VersionUpgraded "workaround: gsloth --version" { gsloth --version }
          Test-VersionUpgraded "workaround: gaunt-sloth --version" { gaunt-sloth --version }
          Test-VersionUpgraded "workaround cmd.exe: gth --version" { cmd /c "gth --version" }
          Write-Host "========== End workaround check =========="

          Write-Host ""
          Write-Host "================ SUMMARY ================"
          if ($failures.Count -eq 0) {
            Write-Host "Workaround confirmed: all checks passed."
            exit 0
          } else {
            Write-Host "$($failures.Count) check(s) FAILED:"
            foreach ($f in $failures) { Write-Host " - $f" }
            Write-Host "Workaround did NOT fully resolve the conflict this run."
            exit 1
          }
