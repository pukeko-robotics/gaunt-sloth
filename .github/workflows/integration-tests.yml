name: Integration tests

on:
  workflow_dispatch:
  # Manually schedulable from a PR by adding the `run-integration-tests` label.
  # Re-add the label (remove then add) to re-run.
  pull_request:
    types: [labeled]

jobs:
  integration-tests:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.label.name == 'run-integration-tests' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: integration tests
    strategy:
      matrix:
        node-version: [24.x]

    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run Integration
      run: npm run it $BIG_TEST_PROVIDER
      env:
        BIG_TEST_PROVIDER: ${{ vars.BIG_TEST_PROVIDER }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
