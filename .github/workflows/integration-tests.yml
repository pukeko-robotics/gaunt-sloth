name: Integration tests

on:
  workflow_dispatch:

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: integration tests
    strategy:
      matrix:
        node-version: [24.x]

    steps:
    - uses: actions/checkout@v6

    - name: Enable Corepack
      run: corepack enable

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run Integration
      run: pnpm run it $BIG_TEST_PROVIDER
      env:
        BIG_TEST_PROVIDER: ${{ vars.BIG_TEST_PROVIDER }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        # GS2-65: powers providerContract.it.ts's single-leading-system smoke (runSingleShot +
        # runConversation against real Anthropic). Without it that describe block skips cleanly; with
        # it, the class of bug GS2-64 was (a double-SystemMessage rejection the vertexai run hides)
        # fails HERE instead of in the field. The GitHub secret itself must be added in repo settings.
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
