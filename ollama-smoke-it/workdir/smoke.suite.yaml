# QA-7 — ollama smoke suite for `gth eval` (Phase 2 of run-ollama-smoke.sh).
#
# One tool-forcing case: read a planted file and report the UNIQUE marker inside it. The marker
# exists nowhere but marker-eval.txt, so passing proves the eval verb ran the real ollama agent,
# called read_file, and synthesized the tool result — the same GS2-59 whole-agent property the
# direct-drive cases assert, plus coverage of the `eval` verb itself.
#
# Kept deliberately small (one case). The direct-drive verbs in the script are the real gate; this
# phase adds the `eval` verb + a structured pass/fail table.
#
# Assertion is `must_contain` ONLY — deliberately no `must_call`. `must_call: ['read_file']` is too
# brittle for a local model: at temp:0 gemma reliably reaches the file, but it often does so as
# `list_directory(.)` THEN `read_file(...)`, and pinning the exact tool it must call adds a failure
# mode that has nothing to do with the property under test. The marker (which exists nowhere but
# marker-eval.txt) appearing in the synthesized answer already proves the whole-agent path ran a tool
# and synthesized its result — the GS2-59 check — without caring which tool the model chose.
target:
  type: gth-agent
cases:
  - id: read-marker-eval
    prompt: 'Read the file marker-eval.txt using your tools and report the exact secret marker string it contains.'
    must_contain: ['MARKER-EVAL-3D8T']
